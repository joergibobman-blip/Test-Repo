name: Issue to Pull Request

on:
  issues:
    types: [opened, edited]

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  assign-issue-to-copilot:
    runs-on: ubuntu-latest
    steps:
      - name: Assign issue to Copilot cloud agent
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_ASSIGN_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue;
            const baseBranch = context.payload.repository.default_branch;
            const action = context.payload.action;

            const customInstructions = [
              'Use the issue title and body as the source of truth for the requested work.',
              'Apply the requested repository changes instead of only copying the issue text into a branch or pull request.',
              'Keep the change focused and minimal.',
              'Open or update a draft pull request that references the issue once the requested changes are implemented.',
              action === 'edited'
                ? 'This issue was edited. Refresh the implementation so it matches the latest issue title and body.'
                : 'This is a newly opened issue. Start from the current default branch and implement the request.',
            ].join('\n');

            await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/assignees', {
              owner,
              repo,
              issue_number: issue.number,
              assignees: ['copilot-swe-agent[bot]'],
              agent_assignment: {
                target_repo: `${owner}/${repo}`,
                base_branch: baseBranch,
                custom_instructions: customInstructions,
                model: '',
              },
            });

            core.info(`Assigned issue #${issue.number} to Copilot cloud agent on ${baseBranch}`);

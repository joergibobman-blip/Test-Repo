<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Tetris</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <main id="main" class="app-shell">
      <section class="game-panel" aria-labelledby="game-title">
        <h1 id="game-title">Neon Tetris</h1>
        <div class="hud">
          <div class="stat-card">
            <span class="label">Score</span>
            <span id="score">0</span>
          </div>
          <div class="stat-card">
            <span class="label">Lines</span>
            <span id="lines">0</span>
          </div>
        </div>
        <div class="board-wrapper">
          <canvas id="board" aria-label="Tetris board"></canvas>
        </div>
        <div class="controls" aria-live="polite">
          <button id="themeBtn" type="button" aria-label="Toggle color theme">🌙 Dark</button>
          <button id="startBtn">Start / Restart</button>
          <p>Use arrow keys to move and rotate.</p>
        </div>
      </section>
      <aside class="side-panel" aria-label="Game information">
        <div class="preview-card">
          <h2>Next</h2>
          <canvas id="next" width="180" height="180" aria-label="Next piece preview"></canvas>
        </div>
        <div class="info-card">
          <h2>How to play</h2>
          <ul>
            <li>Left / Right arrows: move piece</li>
            <li>Down arrow: soft drop</li>
            <li>Up arrow: rotate</li>
            <li>Space bar: hard drop</li>
          </ul>
        </div>
      </aside>
    </main>
    <script src="game.js"></script>
  </body>
</html>
